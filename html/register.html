<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Edenskin</title>
    <link rel="stylesheet" href="../css/register.css">

</head>
<body>
    <header class="header">
        <div class="logo">
        <h1>Edenskin</h1>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>  

    <main class="main-content">
        <h2>Inscription</h2>
        <form action="#" method="post" class="register-form">
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>
            
            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
            </div>
            
            <div class="form-group">
                <label for="telephone">Téléphone :</label>
                <input type="tel" id="telephone" name="telephone" placeholder="06XXXXXXXX" required>
            </div>
            
            <div class="form-group">
                <label for="date_naissance">Date de naissance :</label>
                <input type="date" id="date_naissance" name="date_naissance" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" placeholder="exemple@domaine.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe" required>
            </div>
            
            <div class="form-group">
                <label for="adresse">Adresse de livraison :</label>
                <input type="text" id="adresse" name="adresse" placeholder="Votre adresse" required>
            </div>
            
            <div class="form-group">
                <label for="code_postal">Code postal :</label>
                <input type="text" id="code_postal" name="code_postal" placeholder="Votre code postal" required>
            </div>

            <button type="submit" class="btn">S'inscrire</button>
        </form>
        <p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Mon E-commerce - Tous droits réservés.</p>
    </footer>
</body>
</html>
